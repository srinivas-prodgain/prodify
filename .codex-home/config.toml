approval_policy = "never"

[mcp_servers.axiom]
command = "npx"
args = ["-y", "mcp-server-axiom"]
enabled = true
required = true
startup_timeout_sec = 30
tool_timeout_sec = 90
default_tools_approval_mode = "approve"

[mcp_servers.axiom.env]
AXIOM_TOKEN = "${AXIOM_TOKEN}"
AXIOM_URL = "${AXIOM_URL}"
AXIOM_QUERY_RATE = "1"
AXIOM_QUERY_BURST = "1"
AXIOM_DATASETS_RATE = "1"
AXIOM_DATASETS_BURST = "1"
