name: Test Axiom MCP

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-axiom-mcp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run Codex MCP test
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          codex-home: .codex-home
          prompt-file: .github/codex/prompts/test-axiom-mcp.md
          sandbox: read-only
          output-file: codex-output.md
