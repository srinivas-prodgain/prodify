name: Test Axiom MCP

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  test-axiom-mcp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run Codex MCP test
        uses: openai/codex-action@v1
        env:
          AXIOM_TOKEN: ${{ secrets.AXIOM_TOKEN }}
          AXIOM_URL: https://api.axiom.co
          AXIOM_QUERY_RATE: "1"
          AXIOM_QUERY_BURST: "1"
          AXIOM_DATASETS_RATE: "1"
          AXIOM_DATASETS_BURST: "1"
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          codex-home: .codex-home
          prompt-file: .github/codex/prompts/test-axiom-mcp.md
          sandbox: workspace-write
          output-file: codex-output.md
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex/axiom-test-fix
          title: "fix: handle Axiom-reported test error"
          body-path: codex-output.md
          commit-message: "fix: handle Axiom-reported test error"
          draft: true
